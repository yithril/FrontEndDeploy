<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-accent" aria-hidden="true"></div>
      <div class="header-inner">
        <div class="logo">
          <svg
            class="logo-icon"
            viewBox="0 0 48 48"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <circle cx="24" cy="24" r="22" fill="currentColor" />
            <path
              d="M14 30c2-6 6-10 10-12 4 2 8 6 10 12"
              stroke="#fff"
              stroke-width="2.5"
              stroke-linecap="round"
            />
            <circle cx="18" cy="18" r="2" fill="#fff" />
            <circle cx="30" cy="16" r="2" fill="#fff" />
            <circle cx="24" cy="14" r="2" fill="#fff" />
          </svg>
          <div>
            <h1>Recipe Book</h1>
            <p class="tagline">Browse &amp; search your collection</p>
          </div>
        </div>

        <label class="search" for="search">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="7" />
            <path d="M20 20l-3.5-3.5" />
          </svg>
          <span class="sr-only">Search recipes</span>
          <input
            id="search"
            type="search"
            placeholder="Search by name or ingredient…"
            autocomplete="off"
          />
        </label>
      </div>
    </header>

    <main class="main">
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <ul id="recipe-list" class="recipe-list" hidden></ul>
    </main>

    <div id="modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button class="modal-close" type="button" data-close aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>

        <div class="modal-hero">
          <img id="modal-image" class="modal-image" alt="" hidden />
          <div id="modal-placeholder" class="modal-placeholder" hidden aria-hidden="true">🍽</div>
        </div>

        <div class="modal-body">
          <p class="modal-label">Recipe</p>
          <h2 id="modal-title" class="modal-title"></h2>

          <div class="modal-section">
            <h3 class="modal-section-title">
              <span class="section-accent" aria-hidden="true"></span>
              Ingredients
            </h3>
            <p id="modal-ingredients" class="modal-text"></p>
          </div>

          <div class="modal-section">
            <h3 class="modal-section-title">
              <span class="section-accent" aria-hidden="true"></span>
              Instructions
            </h3>
            <p id="modal-instructions" class="modal-text"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
